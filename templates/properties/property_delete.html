{% extends "base.html" %}
{% block title %}Eliminar propiedad{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl">
  <div class="rounded-[2rem] border p-8 md:p-10" style="background: rgba(255,253,249,0.95); border-color: var(--theme-border-soft); box-shadow: var(--theme-shadow);">
    <div class="flex h-14 w-14 items-center justify-center rounded-2xl text-white" style="background: #c96b56;">!</div>
    <h1 class="brand-serif mt-5 text-4xl" style="color: var(--theme-ink);">Eliminar propiedad</h1>
    <p class="mt-4 text-base leading-8" style="color: var(--theme-muted);">
      Estas a punto de eliminar <span class="font-semibold" style="color: var(--theme-ink);">{{ prop.title }}</span>.
      Esta accion no se puede deshacer.
    </p>
    <div class="mt-8 flex flex-wrap items-center justify-between gap-4">
      <a href="{% url 'properties:mine' %}" class="theme-button-soft rounded-2xl px-5 py-3 text-sm font-semibold">Cancelar</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="rounded-2xl px-5 py-3 text-sm font-semibold text-white" style="background: #c96b56;">Si, eliminar</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
