{% extends "base.html" %}
{% block title %}Pago cancelado{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl">
  <div class="rounded-[2rem] border p-8 md:p-10" style="background: rgba(255,253,249,0.96); border-color: var(--theme-border-soft); box-shadow: var(--theme-shadow);">
    <p class="text-xs font-bold uppercase tracking-[0.3em]" style="color: #b2543b;">Pago cancelado</p>
    <h1 class="brand-serif mt-3 text-4xl" style="color: var(--theme-ink);">No se completo el pago.</h1>
    <p class="mt-4 text-base leading-8" style="color: var(--theme-muted);">
      Puedes volver a intentarlo desde la ficha de <strong>{{ prop.title }}</strong> cuando quieras.
    </p>

    <div class="mt-8 flex flex-wrap gap-3">
      <a href="{% url 'properties:detail' prop.id %}" class="theme-button rounded-2xl px-5 py-3 text-sm font-semibold shadow-sm">
        Intentar de nuevo
      </a>
      <a href="{% url 'properties:catalog' %}" class="theme-button-soft rounded-2xl px-5 py-3 text-sm font-semibold">
        Ir al catalogo
      </a>
    </div>
  </div>
</section>
{% endblock %}
